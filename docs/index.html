<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Culture — Archive</title>
<style>
  :root{--bg:#fff;--ink:#0a0a0a;--muted:#8a8a8a;--line:#e2e2e2;--hover:#f6f6f6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Helvetica Neue",Arial,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}
  a{color:inherit;text-decoration:none}
  .masthead{padding:46px 40px 30px;border-bottom:1px solid var(--ink);display:flex;
    justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
  .masthead h1{font-size:21px;font-weight:700;letter-spacing:-0.2px}
  .masthead p{font-size:13px;color:var(--muted);margin-top:6px;max-width:520px}
  .updated{font-size:12px;color:var(--muted)}
  .toolbar{display:flex;flex-wrap:wrap;gap:18px 30px;align-items:baseline;
    padding:20px 40px;border-bottom:1px solid var(--line);position:sticky;top:0;
    background:rgba(255,255,255,.96);backdrop-filter:blur(6px);z-index:10}
  .filters{display:flex;flex-wrap:wrap;gap:18px}
  .filters span{font-size:13px;color:var(--muted);cursor:pointer;transition:color .12s;
    padding-bottom:2px;border-bottom:1px solid transparent}
  .filters span:hover{color:var(--ink)}
  .filters span.active{color:var(--ink);font-weight:600;border-bottom:1px solid var(--ink)}
  .search{flex:1;min-width:160px;display:flex;justify-content:flex-end}
  #q{border:none;border-bottom:1px solid var(--line);background:transparent;
    font-size:13px;padding:4px 2px;width:220px;outline:none;color:var(--ink)}
  #q:focus{border-color:var(--ink)}#q::placeholder{color:var(--muted)}
  .thead{display:grid;grid-template-columns:120px 1fr 200px 220px;gap:24px;
    padding:14px 40px;border-bottom:1px solid var(--ink);font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.6px;position:sticky;top:63px;background:var(--bg);z-index:9}
  .row{display:grid;grid-template-columns:120px 1fr 200px 220px;gap:24px;
    padding:26px 40px;border-bottom:1px solid var(--line);align-items:start;
    transition:background .12s;cursor:pointer}
  .row:hover{background:var(--hover)}
  .year{font-size:14px;padding-top:3px}
  .title-en{font-size:25px;font-weight:700;letter-spacing:-0.5px;line-height:1.14}
  .title-sub{font-size:14px;color:var(--muted);margin-top:7px}
  .arrow{font-size:13px;color:var(--muted);margin-top:9px;opacity:0;transition:opacity .12s}
  .row:hover .arrow{opacity:1}
  .type{font-size:14px;padding-top:3px}
  .type .src{color:var(--muted);font-size:13px;display:block;margin-top:3px}
  .loc{font-size:14px;padding-top:3px}.loc .sub{color:var(--muted);font-size:13px;display:block;margin-top:3px}
  .status{display:inline-block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;
    margin-left:10px;vertical-align:middle;color:var(--muted)}
  .status.live{color:var(--ink);font-weight:600}
  .thead div[data-sort]{cursor:pointer;user-select:none;transition:color .12s}
  .thead div[data-sort]:hover{color:var(--ink)}
  .thead div.sorted{color:var(--ink)}
  .thead .ind{margin-left:6px;font-size:10px;display:inline-block}
  .count{padding:18px 40px;font-size:12px;color:var(--muted);letter-spacing:.4px}
  .empty{padding:80px 40px;text-align:center;color:var(--muted);font-size:14px}
  footer{padding:40px;border-top:1px solid var(--ink);font-size:12px;color:var(--muted);line-height:1.7}
  @media(max-width:820px){
    .thead{display:none}
    .row{grid-template-columns:1fr;gap:8px;padding:24px 22px}
    .masthead,.toolbar,.count,footer{padding-left:22px;padding-right:22px}
    .toolbar{top:0}.year{order:-1;font-size:12px;color:var(--muted)}
    .type,.loc{font-size:13px}.loc .sub,.type .src{display:inline;margin-left:6px}
  }
</style>
</head>
<body>
<div class="masthead">
  <div>
    <h1>London Culture — Archive</h1>
    <p>런던의 공연 · 전시 · 음악 일정 아카이브. 매일 자동 갱신.</p>
  </div>
  <div class="updated" id="updated"></div>
</div>

<div class="toolbar">
  <div class="filters" id="filters"></div>
  <div class="search"><input id="q" type="text" placeholder="Search"></div>
</div>

<div class="thead" id="thead">
  <div data-sort="period">Period<span class="ind"></span></div>
  <div data-sort="title">Title<span class="ind"></span></div>
  <div data-sort="type">Type<span class="ind"></span></div>
  <div data-sort="venue">Venue<span class="ind"></span></div>
</div>

<div id="list"></div>
<div class="empty" id="empty" style="display:none">No results.</div>
<div class="count" id="count"></div>

<footer>
  Sources — Bachtrack · Ticketmaster · Tate · National Gallery · Time Out.<br>
  자동 수집 데이터입니다. 날짜·가격은 변경될 수 있으니 각 항목을 클릭해 공식 페이지에서 확인하세요.
</footer>

<script>
const CAT_LABELS = {music:'Music', exhibition:'Exhibition', theatre:'Performance', event:'Event'};
const TODAY = new Date();
let EVENTS = [], activeCat = 'all', sortKey = 'period', sortDir = 1;

function fmt(s){const [y,m,d]=s.split('-');return `${m}.${d}`;}
function period(ev){
  if(ev.start && ev.end){
    const long=(new Date(ev.end)-new Date(ev.start))>1000*60*60*24*120;
    if(long) return 'Ongoing';
    if(ev.start===ev.end) return fmt(ev.start)+(ev.time?` · ${ev.time}`:'');
    return `${fmt(ev.start)}–${fmt(ev.end)}`;
  }
  if(ev.end) return 'Until '+fmt(ev.end);
  if(ev.start) return fmt(ev.start)+(ev.time?` · ${ev.time}`:'');
  return ev.date_text || 'TBC';
}
function status(ev){
  if(ev.start && ev.end){
    const s=new Date(ev.start), e=new Date(ev.end);
    if(TODAY>=s && TODAY<=e) return '<span class="status live">Now</span>';
    const days=(s-TODAY)/86400000;
    if(days>0 && days<=30) return '<span class="status">Soon</span>';
  } else if(ev.end && new Date(ev.end)>=TODAY){
    return '<span class="status live">Now</span>';
  }
  return '';
}

function buildFilters(){
  const cats=[...new Set(EVENTS.map(e=>e.category))];
  const order=['music','exhibition','theatre','event'].filter(c=>cats.includes(c));
  const all=[['all','All']].concat(order.map(c=>[c,CAT_LABELS[c]||c]));
  const f=document.getElementById('filters');
  f.innerHTML=all.map(([k,v])=>`<span data-c="${k}"${k==='all'?' class="active"':''}>${v}</span>`).join('');
  f.querySelectorAll('span').forEach(el=>el.onclick=()=>{
    activeCat=el.dataset.c;
    f.querySelectorAll('span').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');render();
  });
}

function sortVal(ev){
  if(sortKey==='title') return (ev.title||'').toLowerCase();
  if(sortKey==='type')  return (ev.type||'').toLowerCase();
  if(sortKey==='venue') return (ev.venue||'').toLowerCase();
  return ev.start||ev.end||'9999';            // period (date)
}
function cmp(a,b){
  const av=sortVal(a), bv=sortVal(b);
  if(av<bv) return -sortDir;
  if(av>bv) return  sortDir;
  const ad=a.start||a.end||'9999', bd=b.start||b.end||'9999'; // tiebreak by date
  return ad<bd?-1:ad>bd?1:0;
}
function markHeaders(){
  document.querySelectorAll('#thead div[data-sort]').forEach(h=>{
    const active=h.dataset.sort===sortKey;
    h.classList.toggle('sorted',active);
    h.querySelector('.ind').textContent = active ? (sortDir>0?'↑':'↓') : '';
  });
}

function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  let list=EVENTS.filter(ev=>{
    if(activeCat!=='all'&&ev.category!==activeCat)return false;
    if(q && !((ev.title+ev.venue+ev.type+ev.source).toLowerCase().includes(q)))return false;
    return true;
  });
  list.sort(cmp);
  markHeaders();
  document.getElementById('empty').style.display=list.length?'none':'block';
  document.getElementById('count').textContent=`${list.length} entries`;
  document.getElementById('list').innerHTML=list.map(ev=>`
    <div class="row" onclick="window.open('${ev.url}','_blank')">
      <div class="year">${period(ev)}</div>
      <div>
        <div class="title-en">${ev.title}${status(ev)}</div>
        ${ev.subtitle?`<div class="title-sub">${ev.subtitle}</div>`:''}
        <div class="arrow">View ↗</div>
      </div>
      <div class="type">${ev.type||CAT_LABELS[ev.category]||''}<span class="src">${ev.source}</span></div>
      <div class="loc">${ev.venue||'—'}${ev.area?`<span class="sub">${ev.area}</span>`:''}</div>
    </div>`).join('');
}

// Inline fallback so the page also works when opened directly (file://),
// where browsers block fetch(). The live GitHub Pages version uses events.json.
const SEED = {"updated":"seed","events":[
{"category":"exhibition","title":"Frida: The Making of an Icon","type":"Exhibition","venue":"Tate Modern","area":"London","start":"2026-06-25","end":"2027-01-03","date_text":"25 June 2026 – 3 January 2027","url":"https://www.tate.org.uk/whats-on/tate-modern/frida-kahlo-the-making-of-an-icon","source":"Tate"},
{"category":"exhibition","title":"Tracey Emin: A Second Life","type":"Exhibition","venue":"Tate Modern","area":"London","start":null,"end":"2026-08-31","date_text":"Until 31 August 2026","url":"https://www.tate.org.uk/whats-on/tate-modern/tracey-emin","source":"Tate"},
{"category":"exhibition","title":"Hurvin Anderson","type":"Exhibition","venue":"Tate Britain","area":"London","start":null,"end":"2026-08-23","date_text":"Until 23 August 2026","url":"https://www.tate.org.uk/whats-on/tate-britain/hurvin-anderson","source":"Tate"},
{"category":"exhibition","title":"Ana Mendieta","type":"Exhibition","venue":"Tate Modern","area":"London","start":"2026-07-15","end":"2027-01-17","date_text":"15 July 2026 – 17 January 2027","url":"https://www.tate.org.uk/whats-on/tate-modern/ana-mendieta","source":"Tate"},
{"category":"exhibition","title":"Zurbarán","type":"Exhibition","venue":"National Gallery","area":"London","start":null,"end":"2026-08-23","date_text":"Until 23 August 2026","url":"https://www.nationalgallery.org.uk/exhibitions/zurbaran","source":"National Gallery"},
{"category":"exhibition","title":"Waldmüller: Landscapes","type":"Exhibition","venue":"National Gallery","area":"London","start":"2026-07-02","end":"2026-09-20","date_text":"2 July – 20 September 2026","url":"https://www.nationalgallery.org.uk/exhibitions/waldmuller-landscapes","source":"National Gallery"},
{"category":"exhibition","title":"Renoir and Love","type":"Exhibition","venue":"National Gallery","area":"London","start":"2026-10-03","end":"2027-01-31","date_text":"3 October 2026 – 31 January 2027","url":"https://www.nationalgallery.org.uk/exhibitions/renoir-and-love","source":"National Gallery"},
{"category":"exhibition","title":"Anish Kapoor","type":"Exhibition","venue":"Hayward Gallery","area":"London","start":"2026-06-16","end":"2026-10-18","date_text":"16 June 2026 – 18 October 2026","url":"https://www.southbankcentre.co.uk/venues/hayward-gallery","source":"Hayward Gallery"},
{"category":"exhibition","title":"Marilyn Monroe: A Portrait","type":"Exhibition","venue":"National Portrait Gallery","area":"London","start":null,"end":"2026-09-06","date_text":"Until 6 September 2026","url":"https://www.npg.org.uk/","source":"National Portrait Gallery"},
{"category":"music","title":"BST Hyde Park","type":"Festival","venue":"Hyde Park","area":"London","start":"2026-06-27","end":"2026-07-12","date_text":"27 June – 12 July 2026","url":"https://www.bst-hydepark.com/","source":"Ticketmaster"},
{"category":"music","title":"Somerset House Summer Series","type":"Concert Series","venue":"Somerset House","area":"London","start":"2026-07-16","end":"2026-07-26","date_text":"16–26 July 2026","url":"https://www.somersethouse.org.uk/whats-on","source":"Ticketmaster"},
{"category":"music","title":"Wolf Alice","type":"Concert","venue":"Finsbury Park","area":"London","start":"2026-07-05","end":"2026-07-05","date_text":"5 July 2026","url":"https://www.wolfalice.co.uk/","source":"Ticketmaster"},
{"category":"music","title":"All Points East","type":"Festival","venue":"Victoria Park","area":"London","start":"2026-08-21","end":"2026-08-30","date_text":"21–30 August 2026","url":"https://www.allpointseastfestival.com/","source":"Ticketmaster"},
{"category":"music","title":"BBC Proms","type":"Classical","venue":"Royal Albert Hall","area":"London","start":"2026-07-17","end":"2026-09-12","date_text":"17 July – 12 September 2026","url":"https://www.royalalberthall.com/tickets/proms/","source":"Bachtrack"},
{"category":"music","title":"Lenny Kravitz","type":"Concert","venue":"Crystal Palace Bowl","area":"London","start":"2026-08-15","end":"2026-08-15","date_text":"15 August 2026","url":"https://www.lennykravitz.com/","source":"Ticketmaster"},
{"category":"theatre","title":"Jesus Christ Superstar","type":"Musical","venue":"London Palladium","area":"London","start":"2026-06-20","end":"2026-09-05","date_text":"20 June – 5 September 2026","url":"https://www.lwtheatres.co.uk/theatres/london-palladium/","source":"Ticketmaster"},
{"category":"theatre","title":"Trainspotting: The Musical","type":"Musical","venue":"Theatre Royal Haymarket","area":"London","start":"2026-07-15","end":"2026-09-30","date_text":"15 July – 30 September 2026","url":"https://www.trh.co.uk/","source":"Ticketmaster"},
{"category":"theatre","title":"CATS","type":"Musical","venue":"Regent's Park Open Air Theatre","area":"London","start":"2026-07-25","end":"2026-09-20","date_text":"25 July – 20 September 2026","url":"https://openairtheatre.com/","source":"Ticketmaster"},
{"category":"theatre","title":"Hamilton","type":"Musical","venue":"Victoria Palace Theatre","area":"London","start":"2026-01-01","end":"2026-12-31","date_text":"Booking through 2026","url":"https://hamiltonmusical.com/london/","source":"Ticketmaster"},
{"category":"event","title":"West End LIVE","type":"Free / Outdoor","venue":"Trafalgar Square","area":"London","start":"2026-06-17","end":"2026-06-26","date_text":"17–26 June 2026","url":"https://www.westendlive.co.uk/","source":"Time Out"},
{"category":"event","title":"Pride in London","type":"Parade","venue":"Central London","area":"London","start":"2026-07-04","end":"2026-07-04","date_text":"4 July 2026","url":"https://prideinlondon.org/","source":"Time Out"},
{"category":"event","title":"Wimbledon","type":"Sport","venue":"All England Club","area":"London","start":"2026-06-29","end":"2026-07-12","date_text":"29 June – 12 July 2026","url":"https://www.wimbledon.com/","source":"Ticketmaster"}
]};

function load(data){
  EVENTS=(data.events||[]).map(e=>({subtitle:'',...e}));
  EVENTS.sort((a,b)=>((a.start||a.end||'9999')>(b.start||b.end||'9999')?1:-1));
  document.getElementById('updated').textContent = data.updated&&data.updated!=='seed'
    ? 'Updated '+data.updated : 'Preview data — live site auto-updates daily';
  buildFilters();render();
}

fetch('events.json?_='+Date.now())
  .then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(load)
  .catch(()=>load(SEED));

document.getElementById('q').addEventListener('input',render);

// click a column header to sort; click again to flip direction
document.querySelectorAll('#thead div[data-sort]').forEach(h=>{
  h.addEventListener('click',()=>{
    const k=h.dataset.sort;
    if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=1; }
    render();
  });
});
</script>
</body>
</html>
